name: Refresh AV safety data
on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/build-data.mjs
      - run: |
          git config user.name "av-safety-bot"
          git config user.email "actions@github.com"
          git add public/data/av_safety.json
          git commit -m "data: refresh $(date -u +%Y-%m-%d)" || echo "No changes"
          git push
